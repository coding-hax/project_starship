name: Guards

# Split out of ci.yml (#164): these two jobs read PR labels (`human-approved`,
# `tests-exempt`) and must re-run on labeled/unlabeled so a label tap re-checks
# them — but that trigger used to drag the whole CI file along with it, costing
# ~11 minutes of e2e/quality for a label change that touched no code. Job names
# stay unchanged; branch protection matches on job name, not workflow file.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  # --- Guard: no weakened tests --------------------------------------------
  test-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch origin main
      - name: Run test-integrity guard
        run: |
          EXEMPT=""
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'tests-exempt'; then
            EXEMPT=1
          fi
          bash scripts/check-test-integrity.sh origin/main "$EXEMPT"

  # --- Guard: protected paths need a human ---------------------------------
  # Migrations, crypto, sync and auth are NOT merged automatically.
  # A mistake there is not a bug, it is data loss.
  protected-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check whether protected paths are touched
        run: |
          git fetch origin main
          TOUCHED=$(git diff --name-only origin/main...HEAD \
            -- 'src/db/**' 'src/crypto/**' 'src/local/**' 'src/app/api/sync/**' \
               'src/auth/**' 'src/app/api/auth/**' 'src/**/auth*' \
               '.github/**' 'scripts/**')

          if [ -z "$TOUCHED" ]; then
            echo "✓ No protected paths touched — auto-merge allowed."
            exit 0
          fi

          echo "This PR touches protected paths:"
          echo "$TOUCHED"

          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'human-approved'; then
            echo "✓ Human approval present (label 'human-approved')."
            exit 0
          fi

          echo ""
          echo "✗ Approval missing. The PR stays open until a human sets the label"
          echo "  'human-approved'. The check then re-runs automatically."
          exit 1
