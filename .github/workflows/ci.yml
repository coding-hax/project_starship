name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  # Not a secret: a throwaway database that lives for the length of one CI run.
  DATABASE_URL: postgresql://starship:starship@localhost:5432/starship
  OWNER_USER_ID: 00000000-0000-0000-0000-00000000c1c1
  RP_ID: localhost
  RP_NAME: Starship
  RP_ORIGIN: http://localhost:3100

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # for the comparison against main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: bash scripts/tests/escalation.test.sh
      - run: bash scripts/tests/research-mode.test.sh
      - run: bash scripts/tests/round-snap.test.sh
      - run: bash scripts/tests/queue-priority.test.sh
      - run: bash scripts/tests/resume-cap.test.sh
      - run: bash scripts/tests/smoke.test.sh
      - run: bash scripts/check-sync-invariants.sh
      - run: bash scripts/tests/sync-invariants.test.sh
      - run: git fetch origin main
      - run: bash scripts/check-dexie-bump.sh origin/main
      - run: bash scripts/tests/dexie-bump.test.sh

  e2e:
    runs-on: ubuntu-latest

    # The specs assert against the real database. The whole point is proving a mutation
    # actually lands in Postgres — not that a mock said it did.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: starship
          POSTGRES_PASSWORD: starship
          POSTGRES_DB: starship
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U starship -d starship"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:migrate
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # --- Guard: schema drift --------------------------------------------------
  # #28: prod ran on a schema that no longer matched src/db/schema.ts because a
  # migration was never generated/applied. `drizzle-kit generate` diffs the code
  # against the committed migration snapshots without touching a real database —
  # any leftover diff means schema.ts and src/db/migrations disagree.
  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Fail if generate produced an uncommitted migration
        run: |
          if [ -n "$(git status --porcelain src/db/migrations)" ]; then
            echo "src/db/schema.ts and src/db/migrations have diverged."
            echo "Run 'pnpm db:generate' locally and commit the result."
            git status --porcelain src/db/migrations
            exit 1
          fi
          echo "✓ Migrations match src/db/schema.ts."

  # --- Guard: no weakened tests --------------------------------------------
  test-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch origin main
      - name: Run test-integrity guard
        run: |
          EXEMPT=""
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'tests-exempt'; then
            EXEMPT=1
          fi
          bash scripts/check-test-integrity.sh origin/main "$EXEMPT"

  # --- Guard: protected paths need a human ---------------------------------
  # Migrations, crypto, sync and auth are NOT merged automatically.
  # A mistake there is not a bug, it is data loss.
  protected-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check whether protected paths are touched
        run: |
          git fetch origin main
          TOUCHED=$(git diff --name-only origin/main...HEAD \
            -- 'src/db/**' 'src/crypto/**' 'src/local/**' 'src/app/api/sync/**' \
               'src/auth/**' 'src/app/api/auth/**' 'src/**/auth*' \
               '.github/**' 'scripts/**')

          if [ -z "$TOUCHED" ]; then
            echo "✓ No protected paths touched — auto-merge allowed."
            exit 0
          fi

          echo "This PR touches protected paths:"
          echo "$TOUCHED"

          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'human-approved'; then
            echo "✓ Human approval present (label 'human-approved')."
            exit 0
          fi

          echo ""
          echo "✗ Approval missing. The PR stays open until a human sets the label"
          echo "  'human-approved'. The check then re-runs automatically."
          exit 1
