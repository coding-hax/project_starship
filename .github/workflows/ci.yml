name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # für den Vergleich gegen main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # --- Wächter: keine aufgeweichten Tests ----------------------------------
  test-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch origin main
      - run: bash scripts/check-test-integrity.sh origin/main

  # --- Wächter: geschützte Pfade brauchen einen Menschen --------------------
  # Migrationen, Krypto, Sync und Auth werden NICHT automatisch gemerged.
  # Ein Fehler ist dort kein Bug, sondern Datenverlust.
  protected-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Prüfen, ob geschützte Pfade berührt werden
        run: |
          git fetch origin main
          TOUCHED=$(git diff --name-only origin/main...HEAD \
            -- 'src/db/**' 'src/crypto/**' 'src/local/**' 'src/app/api/sync/**' \
               'src/**/auth*' '.github/**' 'scripts/**')

          if [ -z "$TOUCHED" ]; then
            echo "✓ Keine geschützten Pfade berührt — Auto-Merge erlaubt."
            exit 0
          fi

          echo "Dieser PR fasst geschützte Pfade an:"
          echo "$TOUCHED"

          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'human-approved'; then
            echo "✓ Menschliche Freigabe liegt vor (Label 'human-approved')."
            exit 0
          fi

          echo ""
          echo "✗ Freigabe fehlt. Der PR bleibt offen, bis ein Mensch das Label"
          echo "  'human-approved' setzt. Danach läuft dieser Check automatisch neu."
          exit 1
