name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  # Not a secret: a throwaway database that lives for the length of one CI run.
  DATABASE_URL: postgresql://starship:starship@localhost:5432/starship
  OWNER_USER_ID: 00000000-0000-0000-0000-00000000c1c1
  RP_ID: localhost
  RP_NAME: Starship
  RP_ORIGIN: http://localhost:3100

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # for the comparison against main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: bash scripts/tests/escalation.test.sh
      - run: bash scripts/tests/research-mode.test.sh
      - run: bash scripts/tests/round-snap.test.sh
      - run: bash scripts/tests/queue-priority.test.sh
      - run: bash scripts/tests/resume-cap.test.sh
      - run: bash scripts/tests/limit-until.test.sh
      - run: bash scripts/tests/ci-watch.test.sh
      - run: bash scripts/tests/smoke.test.sh
      - run: bash scripts/check-sync-invariants.sh
      - run: bash scripts/tests/sync-invariants.test.sh
      - run: git fetch origin main
      - run: bash scripts/check-dexie-bump.sh origin/main
      - run: bash scripts/tests/dexie-bump.test.sh

  # --- e2e, split in two halves that run in parallel (#115) -------------------
  # The production build is only needed by offline-critical.spec.ts (it wants a real
  # service worker). Because Playwright's `webServer` list is global, every run used
  # to pay that build. E2E_SCOPE now boots just the server a half needs, and the two
  # halves run as separate jobs — separate runners, separate Postgres containers, so
  # nothing is shared and no run-lock or database contention is possible.
  #
  # NOTE: the required status check is the aggregate job named `e2e` below. Do not
  # rename these two without updating branch protection, or a failing half would stop
  # blocking the merge.
  #
  # e2e-main is further split into a 3-way shard matrix (#118): the ~4.6s/test that's
  # left after #115 is real work (page boot, sync, expect.poll), nothing left to
  # optimize away, only to distribute. Each shard is its own job with its own
  # Postgres — sharding only splits which tests run where, never a database, so
  # nothing here shares state across shards. fail-fast is off so a red shard doesn't
  # cancel the others: we want the full picture (and the full merged report) every run.
  e2e-main:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: starship
          POSTGRES_PASSWORD: starship
          POSTGRES_DB: starship
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U starship -d starship"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # The browser binaries are the slow part and they are cacheable; the apt
      # packages behind `--with-deps` are not, so they stay a separate step.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install-deps chromium
      - run: pnpm exec playwright install chromium
      - run: pnpm db:migrate
      - run: pnpm exec playwright test --project=mobile --project=desktop --shard=${{ matrix.shard }}/3 --reporter=blob
        env:
          E2E_SCOPE: main
      # Blob keeps every shard's attachments (traces, screenshots, video) so the
      # merge step below can rebuild one HTML report with all of them, pass or fail.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-main-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  # Recombines the per-shard blob reports from e2e-main into the one HTML report a
  # human would actually open. Runs regardless of shard outcome (`if: always()`) —
  # it only builds a report, it never gates the merge (that's still `e2e` below).
  e2e-main-report:
    if: always()
    needs: [e2e-main]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-main-*
          merge-multiple: true
      - run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports
      - uses: actions/upload-artifact@v4
        with:
          name: playwright-report-main
          path: playwright-report/
          retention-days: 14

  e2e-offline:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: starship
          POSTGRES_PASSWORD: starship
          POSTGRES_DB: starship
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U starship -d starship"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install-deps chromium
      - run: pnpm exec playwright install chromium
      # This half is the only one that runs `next build`, so it is the only one that
      # benefits from Next's incremental build cache.
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm db:migrate
      - run: pnpm exec playwright test --project=offline-mobile --project=offline-desktop
        env:
          E2E_SCOPE: offline
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-offline
          path: playwright-report/

  # The required status check. Keeping this name means branch protection and
  # auto-merge stay untouched by the split above. `if: always()` plus the explicit
  # result check matters: a failed `needs` would otherwise leave this job *skipped*,
  # and a skipped required check never turns the merge red.
  e2e:
    needs: [e2e-main, e2e-offline]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Both e2e halves must be green
        run: |
          echo "e2e-main:    ${{ needs.e2e-main.result }}"
          echo "e2e-offline: ${{ needs.e2e-offline.result }}"
          [ "${{ needs.e2e-main.result }}" = "success" ] \
            && [ "${{ needs.e2e-offline.result }}" = "success" ]

  # --- Guard: schema drift --------------------------------------------------
  # #28: prod ran on a schema that no longer matched src/db/schema.ts because a
  # migration was never generated/applied. `drizzle-kit generate` diffs the code
  # against the committed migration snapshots without touching a real database —
  # any leftover diff means schema.ts and src/db/migrations disagree.
  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Fail if generate produced an uncommitted migration
        run: |
          if [ -n "$(git status --porcelain src/db/migrations)" ]; then
            echo "src/db/schema.ts and src/db/migrations have diverged."
            echo "Run 'pnpm db:generate' locally and commit the result."
            git status --porcelain src/db/migrations
            exit 1
          fi
          echo "✓ Migrations match src/db/schema.ts."

  # --- Guard: no weakened tests --------------------------------------------
  test-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch origin main
      - name: Run test-integrity guard
        run: |
          EXEMPT=""
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'tests-exempt'; then
            EXEMPT=1
          fi
          bash scripts/check-test-integrity.sh origin/main "$EXEMPT"

  # --- Guard: protected paths need a human ---------------------------------
  # Migrations, crypto, sync and auth are NOT merged automatically.
  # A mistake there is not a bug, it is data loss.
  protected-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check whether protected paths are touched
        run: |
          git fetch origin main
          TOUCHED=$(git diff --name-only origin/main...HEAD \
            -- 'src/db/**' 'src/crypto/**' 'src/local/**' 'src/app/api/sync/**' \
               'src/auth/**' 'src/app/api/auth/**' 'src/**/auth*' \
               '.github/**' 'scripts/**')

          if [ -z "$TOUCHED" ]; then
            echo "✓ No protected paths touched — auto-merge allowed."
            exit 0
          fi

          echo "This PR touches protected paths:"
          echo "$TOUCHED"

          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'human-approved'; then
            echo "✓ Human approval present (label 'human-approved')."
            exit 0
          fi

          echo ""
          echo "✗ Approval missing. The PR stays open until a human sets the label"
          echo "  'human-approved'. The check then re-runs automatically."
          exit 1
